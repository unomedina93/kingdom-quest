name: Build Kingdom Quest

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate icon
        run: npm run generate-icon

      - name: Build Mac (.zip)
        run: npx electron-builder --mac zip --publish never

      - name: Upload Mac build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate icon
        run: npm run generate-icon

      - name: Build Windows (.exe)
        run: npx electron-builder --win --publish never

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  release:
    needs: [build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/win

      - name: Download Mac build (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mac-build
          path: dist/mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kingdom Quest ${{ github.ref_name }}
          body: |
            ## Kingdom Quest ${{ github.ref_name }}

            ### Download:
            - **Windows**: Download the `.exe` file and run it to install
            - **Mac**: Download the `.zip` file, unzip, and drag to Applications

            The app works offline and auto-updates when connected to WiFi!
          files: |
            dist/win/*.exe
            dist/mac/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
